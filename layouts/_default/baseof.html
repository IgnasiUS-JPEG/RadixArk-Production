<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ if .Title }}{{ .Title }} · {{ end }}RadixArk Blog</title>
    <link rel="stylesheet" href="{{ "styles.css" | relURL }}" />
  </head>
  <body>
    <div class="page{{ if .IsHome }}{{ else }} page-detail{{ end }}">
      <header class="page-header">
        {{ if not .IsHome }}
          <a href="{{ "/" | relURL }}" class="back-link">← Back to all articles</a>
        {{ end }}
        <div class="logo-mark" aria-hidden="true"></div>
        <div class="page-eyebrow">
          {{ if .IsHome }}
            News &amp; Blog at <span class="brand">{{ site.Params.brand }}</span>
          {{ else }}
            RadixArk · Insight
          {{ end }}
        </div>
        {{ if .IsHome }}
          <p class="page-subtitle">
            New intent in technology, awareness, and updates.
          </p>
        {{ end }}
      </header>

      {{ block "main" . }}{{ end }}
    </div>
  </body>
</html>
